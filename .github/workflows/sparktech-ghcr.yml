name: Sparktech GHCR Image

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: sparktech-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      app_version: ${{ steps.meta.outputs.app_version }}
      build_type: ${{ steps.meta.outputs.build_type }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          app_version="$(node -p "require('./package.json').version")"
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            image_tag="dev"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            image_tag="prod"
          else
            image_tag="$(echo "${GITHUB_REF_NAME}" | tr -cs '[:alnum:].-' '-')"
          fi
          if [ "${image_tag}" = "prod" ]; then
            build_type="stable"
          else
            build_type="canary"
          fi
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "build_type=${build_type}" >> "$GITHUB_OUTPUT"

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v6
      - name: Setup Version
        uses: ./.github/actions/setup-version
        with:
          app-version: ${{ needs.metadata.outputs.app_version }}
      - name: Setup Node.js
        uses: ./.github/actions/setup-node
      - name: Build web
        run: yarn affine @affine/web build
        env:
          BUILD_TYPE: ${{ needs.metadata.outputs.build_type }}
          CAPTCHA_SITE_KEY: ${{ secrets.CAPTCHA_SITE_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: affine-web
          SENTRY_RELEASE: ${{ needs.metadata.outputs.app_version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PERFSEE_TOKEN: ${{ secrets.PERFSEE_TOKEN }}
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: ./packages/frontend/apps/web/dist
          if-no-files-found: error

  build-admin:
    name: Build admin
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v6
      - name: Setup Version
        uses: ./.github/actions/setup-version
        with:
          app-version: ${{ needs.metadata.outputs.app_version }}
      - name: Setup Node.js
        uses: ./.github/actions/setup-node
      - name: Build admin
        run: yarn affine @affine/admin build
        env:
          BUILD_TYPE: ${{ needs.metadata.outputs.build_type }}
          CAPTCHA_SITE_KEY: ${{ secrets.CAPTCHA_SITE_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: affine-admin
          SENTRY_RELEASE: ${{ needs.metadata.outputs.app_version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PERFSEE_TOKEN: ${{ secrets.PERFSEE_TOKEN }}
      - name: Upload admin artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin
          path: ./packages/frontend/admin/dist
          if-no-files-found: error

  build-mobile:
    name: Build mobile
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v6
      - name: Setup Version
        uses: ./.github/actions/setup-version
        with:
          app-version: ${{ needs.metadata.outputs.app_version }}
      - name: Setup Node.js
        uses: ./.github/actions/setup-node
      - name: Build mobile
        run: yarn affine @affine/mobile build
        env:
          BUILD_TYPE: ${{ needs.metadata.outputs.build_type }}
          CAPTCHA_SITE_KEY: ${{ secrets.CAPTCHA_SITE_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: affine-mobile
          SENTRY_RELEASE: ${{ needs.metadata.outputs.app_version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PERFSEE_TOKEN: ${{ secrets.PERFSEE_TOKEN }}
      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile
          path: ./packages/frontend/apps/mobile/dist
          if-no-files-found: error

  build-server-native:
    name: Build server native ${{ matrix.target.file }}
    runs-on: ubuntu-22.04
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-unknown-linux-gnu
            file: server-native.x64.node
          - name: aarch64-unknown-linux-gnu
            file: server-native.arm64.node
          - name: armv7-unknown-linux-gnueabihf
            file: server-native.armv7.node
    steps:
      - uses: actions/checkout@v6
      - name: Setup Version
        uses: ./.github/actions/setup-version
        with:
          app-version: ${{ needs.metadata.outputs.app_version }}
      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          electron-install: false
          extra-flags: workspaces focus @affine/server-native
      - name: Build Rust
        uses: ./.github/actions/build-rust
        env:
          AFFINE_PRO_PUBLIC_KEY: ${{ secrets.AFFINE_PRO_PUBLIC_KEY }}
          AFFINE_PRO_LICENSE_AES_KEY: ${{ secrets.AFFINE_PRO_LICENSE_AES_KEY }}
        with:
          target: ${{ matrix.target.name }}
          package: '@affine/server-native'
      - name: Rename native addon
        run: mv ./packages/backend/native/server-native.node ./packages/backend/native/${{ matrix.target.file }}
      - name: Upload server-native
        uses: actions/upload-artifact@v4
        with:
          name: server-native-${{ matrix.target.file }}
          path: ./packages/backend/native/${{ matrix.target.file }}
          if-no-files-found: error

  build-server:
    name: Build server
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-server-native
    steps:
      - uses: actions/checkout@v6
      - name: Setup Version
        uses: ./.github/actions/setup-version
        with:
          app-version: ${{ needs.metadata.outputs.app_version }}
      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          electron-install: false
          extra-flags: workspaces focus @affine/server @types/affine__env
      - name: Download server-native
        uses: actions/download-artifact@v4
        with:
          pattern: server-native-*
          merge-multiple: true
          path: ./packages/backend/native
      - name: Build server
        run: yarn workspace @affine/server build
      - name: Upload server dist
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: ./packages/backend/server/dist
          if-no-files-found: error

  build-image:
    name: Build image
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-server
      - build-web
      - build-mobile
      - build-admin
    steps:
      - uses: actions/checkout@v6
      - name: Download server dist
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: ./packages/backend/server/dist
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: ./packages/frontend/apps/web/dist
      - name: Download mobile artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile
          path: ./packages/frontend/apps/mobile/dist
      - name: Download admin artifact
        uses: actions/download-artifact@v4
        with:
          name: admin
          path: ./packages/frontend/admin/dist
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: '@toeverything'
      - name: Install production server dependencies
        run: |
          yarn config set --json supportedArchitectures.cpu '["x64", "arm64", "arm"]'
          yarn config set --json supportedArchitectures.libc '["glibc"]'
          yarn workspaces focus @affine/server --production
      - name: Generate Prisma client
        run: yarn workspace @affine/server prisma generate
      - name: Move node_modules into server package
        run: mv ./node_modules ./packages/backend/server
      - name: Setup Version
        uses: ./.github/actions/setup-version
        with:
          app-version: ${{ needs.metadata.outputs.app_version }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push AFFiNE image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/deployment/node/Dockerfile
          push: true
          pull: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/affine:${{ needs.metadata.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/affine:${{ needs.metadata.outputs.image_tag }}-${{ needs.metadata.outputs.short_sha }}
